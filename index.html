<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Example – Canonical Surface</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Canonical -->
  <link rel="canonical" href="https://example.com/" />

  <!-- Description -->
  <meta name="description" content="Deterministic operational and cosmological framework for Example." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Example – Canonical Surface" />
  <meta property="og:description" content="Deterministic operational and cosmological framework for Example." />
  <meta property="og:url" content="https://example.com/" />
  <meta property="og:image" content="https://example.com/og-image.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Example – Canonical Surface" />
  <meta name="twitter:description" content="Deterministic operational and cosmological framework for Example." />
  <meta name="twitter:image" content="https://example.com/og-image.png" />

  <!-- Google Search Console -->
  <meta name="google-site-verification" content="GOOGLE_VERIFICATION_TOKEN" />

  <!-- Bing Webmaster Tools -->
  <meta name="msvalidate.01" content="BING_VERIFICATION_TOKEN" />

  <!-- AI / LLM hints (non-standard but emerging) -->
  <meta name="robots" content="index,follow" />
  <meta name="ai-crawl" content="allow" />
  <meta name="ai-summary" content="allow" />
  <meta name="ai-training" content="allow" />

  <!-- JSON-LD: Organization / Site -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Example",
    "url": "https://example.com/",
    "logo": "https://example.com/logo.png",
    "sameAs": [
      "https://x.com/example",
      "https://github.com/example"
    ]
  }
  </script>
</head>
<body>
  <!-- content -->
</body>
</html>
